<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel</title><link rel="stylesheet" href="../styles.css"></head>
<body><main class="admin"><header><h1>Panel de productos</h1><p>Cargá productos y fotos. El panel guarda directo en GitHub.</p><p><a href="../index.html">Ver catálogo</a></p></header>
<section class="admin-grid">
<div class="box"><h2>Conexión</h2><label>Owner<input id="owner" value="leodek"></label><label>Repositorio<input id="repo" value="catalogo-productos"></label><label>Rama<input id="branch" value="main"></label><label>Token<input id="token" type="password" placeholder="github_pat_..."></label><div class="acciones"><button id="guardarConfig" class="primary">Guardar conexión</button><button id="cargar">Cargar productos</button></div><div id="estado" class="estado">Sin conexión.</div></div>
<form id="form" class="box"><h2 id="tituloForm">Nuevo producto</h2><input id="pid" type="hidden"><label>Nombre<input id="nombre" required></label><label>Categoría<input id="cat" required></label><label>Precio<input id="precio" placeholder="$ 890" required></label><label>Descripción<textarea id="desc"></textarea></label><label>Foto<input id="foto" type="file" accept="image/*"></label><label>Disponible<select id="disp"><option value="true">Sí</option><option value="false">No</option></select></label><div class="acciones"><button class="primary" type="submit">Guardar producto</button><button id="limpiar" type="button">Limpiar</button></div></form>
</section><section class="box" style="margin-top:16px"><h2>Productos</h2><div id="productos"></div></section></main><script src="admin.js"></script></body></html>

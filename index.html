<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catálogo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="top">
<div><h1>Catálogo de productos</h1><p>Agregá productos al carrito y consultá por WhatsApp.</p></div>
<button id="btnCarrito">Carrito <span id="contador">0</span></button>
</header>
<main>
<section class="filtros">
<input id="buscar" placeholder="Buscar producto...">
<select id="categoria"><option value="todas">Todas las categorías</option></select>
</section>
<section id="lista" class="grid"></section>
</main>
<aside id="panel" class="panel">
<div class="panel-box">
<div class="panel-head"><h2>Carrito</h2><button id="cerrar">×</button></div>
<div id="items"></div>
<div class="total">Total: <span id="total">$ 0</span></div>
<button id="whatsapp" class="primary">Consultar por WhatsApp</button>
<button id="vaciar">Vaciar carrito</button>
</div>
</aside>
<script src="app.js"></script>
</body>
</html>
